version: "3.8"

services:
  # ─── API Backend ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vectorindex-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - VECTOR_DB_PATH=/data/vector_store
      - METADATA_DB_PATH=/data/metadata.db
      - UPLOAD_DIR=/data/uploads
    volumes:
      - vector_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vectorindex-network

  # ─── Frontend (Static Build) ───────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: vectorindex-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - vectorindex-network

  # ─── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vectorindex-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - api
      - frontend
    networks:
      - vectorindex-network

volumes:
  vector_data:
    driver: local
  nginx_ssl:
    driver: local

networks:
  vectorindex-network:
    driver: bridge